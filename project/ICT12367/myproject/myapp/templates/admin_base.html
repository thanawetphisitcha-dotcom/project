{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ระบบจัดการหลังร้าน - อร่อยเด็ด{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .sidebar {
            min-height: 100vh;
            background-color: #343a40; /* โทนสีเข้มดูเป็นทางการ */
            color: white;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            transition: 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #495057;
            color: white;
            border-left: 4px solid #dc3545; /* แถบสีแดงให้เข้ากับธีมร้าน */
        }
        .content-area { padding: 30px; }
        .admin-header { background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="sidebar w-25" style="max-width: 250px;">
        <div class="p-4 text-center border-bottom border-secondary">
            <h4 class="mb-0 text-white"><i class="fas fa-utensils text-danger me-2"></i>อร่อยเด็ด</h4>
            <small class="text-muted">Admin Panel</small>
        </div>
        <div class="mt-3">
            <a href="{% url 'admin_dashboard' %}" class="{% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt me-2"></i> ภาพรวม (Dashboard)
            </a>
            <a href="{% url 'admin_bookings' %}" class="{% if request.resolver_match.url_name == 'admin_bookings' %}active{% endif %}">
                <i class="fas fa-calendar-check me-2"></i> จัดการการจอง
            </a>
            <a href="{% url 'admin_tables' %}" class="{% if request.resolver_match.url_name == 'admin_tables' %}active{% endif %}">
                <i class="fas fa-chair me-2"></i> จัดการโต๊ะ
            </a>
            <a href="{% url 'admin_menu' %}" class="{% if request.resolver_match.url_name == 'admin_menu' %}active{% endif %}">
                <i class="fas fa-hamburger me-2"></i> จัดการเมนูอาหาร
            </a>
            <hr class="border-secondary mx-3">
            <a href="{% url 'home' %}" class="text-info">
                <i class="fas fa-external-link-alt me-2"></i> ดูหน้าเว็บลูกค้า
            </a>
            <a href="{% url 'logout' %}" class="text-danger mt-5">
                <i class="fas fa-sign-out-alt me-2"></i> ออกจากระบบ
            </a>
        </div>
    </div>

    <div class="flex-grow-1 bg-light">
        <div class="admin-header p-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 text-dark fw-bold">{% block header_title %}หน้าจัดการ{% endblock %}</h5>
            <div class="d-flex align-items-center">
                <span class="me-3">สวัสดี, แอดมิน</span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=dc3545&color=fff" class="rounded-circle" width="40" alt="Admin">
            </div>
        </div>

        <div class="content-area">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
