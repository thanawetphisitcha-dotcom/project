{% extends 'base.html' %}

{% block title %}เข้าสู่ระบบ - ร้านอร่อยเด็ด{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden mt-5">
                <div class="card-header bg-dark text-white p-4 border-bottom border-3" style="border-color: #A31D1D !important;">
                    <h3 class="mb-0 text-center fw-bold">
                        <i class="fas fa-sign-in-alt text-premium-red me-2"></i> เข้าสู่ระบบ
                    </h3>
                </div>
                
                <div class="card-body p-4 p-md-5 bg-white auth-form-container">
                    {% if form.errors %}
                        <div class="alert alert-danger rounded-3 shadow-sm border-0 mb-4 text-center" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i> ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!
                        </div>
                    {% endif %}

                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">ชื่อผู้ใช้ (Username)</label>
                            <input type="text" name="username" class="form-control form-control-lg bg-light border-0" required autofocus placeholder="กรอกชื่อผู้ใช้ของคุณ">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">รหัสผ่าน (Password)</label>
                            <input type="password" name="password" class="form-control form-control-lg bg-light border-0" required placeholder="กรอกรหัสผ่านของคุณ">
                        </div>

                        <div class="mt-5 text-center">
                            <button type="submit" class="btn btn-premium-red btn-lg w-100 rounded-pill fw-bold shadow-sm py-3">
                                เข้าสู่ระบบ <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </form>

                    <hr class="my-4 text-muted">
                    
                    <div class="text-center">
                        <span class="text-muted">ยังไม่มีบัญชีใช่หรือไม่?</span>
                        <a href="{% url 'register' %}" class="text-premium-red fw-bold text-decoration-none ms-1">สมัครสมาชิกที่นี่</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
